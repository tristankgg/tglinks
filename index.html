<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tristan's Matrix Links</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Orbitron', monospace;
      background: #000000;
      min-height: 100vh;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff0099;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          rgba(0, 255, 0, 0.03) 0px,
          rgba(0, 255, 0, 0.03) 1px,
          transparent 1px,
          transparent 2px
        );
      pointer-events: none;
      z-index: 1;
      animation: scanlines 8s linear infinite;
    }

    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    .container { 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 2rem 1rem;
      position: relative;
      z-index: 2;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
      border: 2px solid #00ff00;
      border-radius: 4px;
      padding: 2rem;
      background: rgba(0, 255, 0, 0.05);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 255, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-content {
      flex: 1;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 900;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff0099, 0 0 30px #00ff0066;
      letter-spacing: 2px;
    }

    .header p {
      font-size: 0.9rem;
      color: #00cc00;
      letter-spacing: 1px;
      margin-top: 1rem;
    }

    .edit-toggle-btn {
      background: rgba(0, 255, 0, 0.1);
      border: 2px solid #00ff00;
      color: #00ff00;
      padding: 0.8rem 1.5rem;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 2px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.2s;
      text-shadow: 0 0 5px #00ff00;
    }

    .edit-toggle-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
    }

    .edit-toggle-btn.active {
      background: rgba(255, 0, 0, 0.2);
      border-color: #ff0000;
      color: #ff0000;
      text-shadow: 0 0 5px #ff0000;
    }

    .edit-toggle-btn.active:hover {
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
    }

    .categories { display: grid; gap: 2rem; }

    .category {
      background: rgba(0, 255, 0, 0.05);
      border: 1px solid #00ff00;
      border-radius: 2px;
      padding: 2rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.2), inset 0 0 15px rgba(0, 255, 0, 0.05);
      position: relative;
      overflow: hidden;
    }

    .category::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.1), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 2;
    }

    .category-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #00ff00;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-shadow: 0 0 10px #00ff00;
      letter-spacing: 1px;
    }

    .category-icon {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #00ff00;
      border-radius: 2px;
      font-size: 20px;
      background: rgba(0, 255, 0, 0.1);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    }

    .category-controls {
      display: flex;
      gap: 0.5rem;
    }

    .icon-btn {
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      color: #00ff00;
      width: 32px;
      height: 32px;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      position: relative;
      z-index: 2;
    }

    .link-btn {
      padding: 1rem;
      border: 1px solid #00ff00;
      border-radius: 2px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: all 0.2s;
      color: #00ff00;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(0, 255, 0, 0.05);
      text-shadow: 0 0 5px #00ff00;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.5px;
      position: relative;
    }

    .link-btn:hover {
      background: rgba(0, 255, 0, 0.15);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.6), inset 0 0 15px rgba(0, 255, 0, 0.2);
      transform: scale(1.05);
      color: #00ffaa;
    }

    .link-btn.edit-mode {
      cursor: grab;
    }

    .link-btn.edit-mode:active {
      cursor: grabbing;
    }

    .link-delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(255, 0, 0, 0.3);
      border: 1px solid #ff0000;
      color: #ff0000;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
    }

    .edit-mode .link-delete-btn {
      opacity: 1;
    }

    .link-delete-btn:hover {
      background: rgba(255, 0, 0, 0.6);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: rgba(0, 255, 0, 0.08);
      border: 2px solid #00ff00;
      border-radius: 2px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
    }

    .modal-title {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #00ff00;
      font-size: 0.9rem;
      text-shadow: 0 0 5px #00ff00;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.8rem;
      background: rgba(0, 255, 0, 0.05);
      border: 1px solid #00ff00;
      color: #00ff00;
      font-family: 'Orbitron', monospace;
      border-radius: 2px;
      font-size: 0.9rem;
    }

    .form-group input::placeholder {
      color: #00aa00;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .modal-btn {
      flex: 1;
      padding: 0.8rem;
      border: 1px solid #00ff00;
      background: rgba(0, 255, 0, 0.1);
      color: #00ff00;
      cursor: pointer;
      border-radius: 2px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      transition: all 0.2s;
      text-shadow: 0 0 5px #00ff00;
    }

    .modal-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
    }

    .modal-btn.cancel {
      border-color: #ff0000;
      color: #ff0000;
      background: rgba(255, 0, 0, 0.1);
      text-shadow: 0 0 5px #ff0000;
    }

    .modal-btn.cancel:hover {
      background: rgba(255, 0, 0, 0.2);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #00aa00;
      font-style: italic;
    }

    .dragging {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-content">
        <h1>// MATRIX ACCESS</h1>
        <p>▓▒░ PERSONAL LINK TERMINAL ░▒▓</p>
      </div>
      <button class="edit-toggle-btn" id="editToggle">EDIT MODE</button>
    </div>

    <div id="categoriesContainer" class="categories"></div>
  </div>

  <!-- Add Link Modal -->
  <div class="modal" id="addLinkModal">
    <div class="modal-content">
      <div class="modal-title">ADD NEW LINK</div>
      <div class="form-group">
        <label>Link Name</label>
        <input type="text" id="linkName" placeholder="Enter link name">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="linkCategory"></select>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn" id="addLinkBtn">ADD</button>
        <button class="modal-btn cancel" id="cancelAddBtn">CANCEL</button>
      </div>
    </div>
  </div>

  <!-- Edit Link Modal -->
  <div class="modal" id="editLinkModal">
    <div class="modal-content">
      <div class="modal-title">EDIT LINK</div>
      <div class="form-group">
        <label>Link Name</label>
        <input type="text" id="editLinkName" placeholder="Enter link name">
      </div>
      <div class="form-group">
        <label>New Category</label>
        <select id="editLinkCategory"></select>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn" id="saveLinkBtn">SAVE</button>
        <button class="modal-btn cancel" id="cancelEditBtn">CANCEL</button>
      </div>
    </div>
  </div>

  <script>
    const defaultCategories = [
      'ENTERTAINMENT STREAM',
      'COMMERCE NETWORK',
      'GAMING VAULT',
      'UTILITY PROTOCOL',
      'FINANCIAL DATABASE',
      'DATA REPOSITORY',
      'RESOURCE MATRIX'
    ];

    const categoryIcons = {
      'ENTERTAINMENT STREAM': '📺',
      'COMMERCE NETWORK': '🛒',
      'GAMING VAULT': '🎮',
      'UTILITY PROTOCOL': '⚙️',
      'FINANCIAL DATABASE': '💰',
      'DATA REPOSITORY': '📊',
      'RESOURCE MATRIX': '🔗'
    };

    const defaultLinks = {
      'ENTERTAINMENT STREAM': ['Netflix', 'Disney Channel', 'Stan', 'Plex Media', 'FlixHDcc', 'Movie Box', 'Binge', 'YouTube'],
      'COMMERCE NETWORK': ['Amazon', 'Google', 'eBay', 'GumTree'],
      'GAMING VAULT': ['Discord', 'Minecraft Tools', 'Spotify', 'NRL', 'FootyTips', 'MS Dos Games', 'SNES Online', 'Texas Holdem', 'Emulator Games', 'Megadrive'],
      'UTILITY PROTOCOL': ['Gmail', 'Cebuano Vocab', 'Grammar Check', 'Google Drive', 'My Gov', 'My Passport', 'Image Hosting', 'PNG to Icon', 'Photo Editing'],
      'FINANCIAL DATABASE': ['CommBank', 'DoDo Gas', 'Commsec', 'LINK Tolls', '3D Models', 'If This Then That', 'Alexa Config', 'Arlo Login'],
      'DATA REPOSITORY': ['Realestate Sheet', 'Study Meetings', 'Activity Notes', 'Budget', 'RpData'],
      'RESOURCE MATRIX': ['Y Flix Online', 'Y Flix to', 'Terra Master NAS', 'Unify Machine', 'Ozbargain', 'Dominos', '1377x', 'Kick Ass Torrent', 'Pirate Bay', 'FlashCloud']
    };

    let editMode = false;
    let data = JSON.parse(localStorage.getItem('matrixLinks')) || JSON.parse(JSON.stringify(defaultLinks));
    let draggedElement = null;
    let currentEditLink = null;
    let currentEditCategory = null;

    function saveData() {
      localStorage.setItem('matrixLinks', JSON.stringify(data));
    }

    function renderCategories() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = '';
      
      Object.keys(data).forEach(category => {
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'category-header';
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'category-title';
        titleDiv.innerHTML = `
          <div class="category-icon">${categoryIcons[category] || '🔗'}</div>
          ${category}
        `;
        
        const controlsDiv = document.createElement('div');
        controlsDiv.className = 'category-controls';
        
        if (editMode) {
          const addBtn = document.createElement('button');
          addBtn.className = 'icon-btn';
          addBtn.textContent = '➕';
          addBtn.onclick = () => showAddLinkModal(category);
          controlsDiv.appendChild(addBtn);
        }
        
        headerDiv.appendChild(titleDiv);
        headerDiv.appendChild(controlsDiv);
        categoryDiv.appendChild(headerDiv);
        
        const linksGrid = document.createElement('div');
        linksGrid.className = 'links-grid';
        
        if (data[category].length === 0) {
          const emptyState = document.createElement('div');
          emptyState.className = 'empty-state';
          emptyState.textContent = 'No links yet...';
          linksGrid.appendChild(emptyState);
        } else {
          data[category].forEach((link, index) => {
            const linkBtn = document.createElement('a');
            linkBtn.className = 'link-btn';
            if (editMode) linkBtn.classList.add('edit-mode');
            linkBtn.href = '#';
            linkBtn.textContent = link;
            linkBtn.draggable = editMode;
            
            if (editMode) {
              const deleteBtn = document.createElement('div');
              deleteBtn.className = 'link-delete-btn';
              deleteBtn.textContent = '✕';
              deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deleteLink(category, index);
              };
              linkBtn.appendChild(deleteBtn);
              
              linkBtn.ondragstart = (e) => {
                draggedElement = { link, category, index };
                linkBtn.classList.add('dragging');
              };
              linkBtn.ondragend = () => {
                linkBtn.classList.remove('dragging');
              };
              
              linkBtn.ondblclick = () => {
                showEditLinkModal(category, index, link);
              };
            }
            
            linkBtn.onclick = (e) => {
              e.preventDefault();
              if (!editMode) {
                alert('> ACCESSING: ' + link.toUpperCase() + '\n> STATUS: READY FOR CONNECTION');
              }
            };
            
            linksGrid.appendChild(linkBtn);
          });
        }
        
        linksGrid.ondrop = (e) => {
          e.preventDefault();
          if (draggedElement && editMode) {
            moveLink(draggedElement.category, draggedElement.index, category);
          }
        };
        linksGrid.ondragover = (e) => e.preventDefault();
        
        categoryDiv.appendChild(linksGrid);
        container.appendChild(categoryDiv);
      });
    }

    function toggleEditMode() {
      editMode = !editMode;
      const btn = document.getElementById('editToggle');
      btn.textContent = editMode ? 'EXIT EDIT' : 'EDIT MODE';
      btn.classList.toggle('active');
      renderCategories();
    }

    function showAddLinkModal(category) {
      const modal = document.getElementById('addLinkModal');
      const select = document.getElementById('linkCategory');
      select.innerHTML = Object.keys(data).map(cat => `<option value="${cat}">${cat}</option>`).join('');
      select.value = category;
      modal.classList.add('active');
    }

    function showEditLinkModal(category, index, link) {
      currentEditLink = link;
      currentEditCategory = { category, index };
      document.getElementById('editLinkName').value = link;
      const select = document.getElementById('editLinkCategory');
      select.innerHTML = Object.keys(data).map(cat => `<option value="${cat}">${cat}</option>`).join('');
      select.value = category;
      document.getElementById('editLinkModal').classList.add('active');
    }

    function addLink() {
      const name = document.getElementById('linkName').value.trim();
      const category = document.getElementById('linkCategory').value;
      
      if (!name) {
        alert('> ERROR: LINK NAME REQUIRED');
        return;
      }
      
      if (!data[category]) data[category] = [];
      data[category].push(name);
      saveData();
      renderCategories();
      
      document.getElementById('linkName').value = '';
      document.getElementById('addLinkModal').classList.remove('active');
    }

    function deleteLink(category, index) {
      if (confirm('> DELETE LINK: ' + data[category][index] + '?')) {
        data[category].splice(index, 1);
        saveData();
        renderCategories();
      }
    }

    function moveLink(fromCategory, fromIndex, toCategory) {
      const link = data[fromCategory][fromIndex];
      data[fromCategory].splice(fromIndex, 1);
      if (!data[toCategory]) data[toCategory] = [];
      data[toCategory].push(link);
      saveData();
      renderCategories();
    }

    function saveEditLink() {
      const newName = document.getElementById('editLinkName').value.trim();
      const newCategory = document.getElementById('editLinkCategory').value;
      
      if (!newName) {
        alert('> ERROR: LINK NAME REQUIRED');
        return;
      }
      
      const { category, index } = currentEditCategory;
      
      if (newCategory !== category) {
        data[category].splice(index, 1);
        if (!data[newCategory]) data[newCategory] = [];
        data[newCategory].push(newName);
      } else {
        data[category][index] = newName;
      }
      
      saveData();
      renderCategories();
      document.getElementById('editLinkModal').classList.remove('active');
      currentEditLink = null;
      currentEditCategory = null;
    }

    // Event listeners
    document.getElementById('editToggle').addEventListener('click', toggleEditMode);
    document.getElementById('addLinkBtn').addEventListener('click', addLink);
    document.getElementById('cancelAddBtn').addEventListener('click', () => {
      document.getElementById('addLinkModal').classList.remove('active');
      document.getElementById('linkName').value = '';
    });
    document.getElementById('saveLinkBtn').addEventListener('click', saveEditLink);
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      document.getElementById('editLinkModal').classList.remove('active');
      currentEditLink = null;
      currentEditCategory = null;
    });

    document.getElementById('linkName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addLink();
    });

    document.getElementById('editLinkName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEditLink();
    });

    // Initial render
    renderCategories();
  </script>
</body>
</html>
