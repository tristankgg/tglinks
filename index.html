<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tristan's Matrix Links</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Orbitron', monospace;
      background: #000000;
      min-height: 100vh;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff0099;
      position: relative;
      overflow-x: hidden;
    }

    /* Matrix code background animation */
    #matrixBackground {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.15;
    }

    /* Scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          rgba(0, 255, 0, 0.03) 0px,
          rgba(0, 255, 0, 0.03) 1px,
          transparent 1px,
          transparent 2px
        );
      pointer-events: none;
      z-index: 1;
      animation: scanlines 8s linear infinite;
    }

    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 1rem 0.5rem;
      position: relative;
      z-index: 2;
    }

    .header {
      text-align: left;
      margin-bottom: 1.8rem;
      border: 2px solid #00ff00;
      border-radius: 4px;
      padding: 1.2rem;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 255, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
      gap: 1rem;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
      }
    }

    .header-content {
      flex: 1;
    }

    .matrix-face-icon {
      width: 80px;
      height: 80px;
      margin-right: 1.5rem;
      border: 2px solid #00ff00;
      border-radius: 4px;
      object-fit: cover;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
      display: block;
    }

    @media (max-width: 768px) {
      .matrix-face-icon {
        width: 60px;
        height: 60px;
        margin-right: 1rem;
        margin-bottom: 0.5rem;
      }
    }

    .header h1 {
      font-size: 1.8rem;
      margin-bottom: 0.6rem;
      font-weight: 900;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff0099, 0 0 30px #00ff0066;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    .header p {
      font-size: 0.78rem;
      color: #00cc00;
      letter-spacing: 1px;
      margin-top: 0.6rem;
      line-height: 1.2;
    }

    .edit-toggle-btn {
      background: rgba(0, 255, 0, 0.1);
      border: 2px solid #00ff00;
      color: #00ff00;
      padding: 0.6rem 1.2rem;
      font-size: 0.84rem;
      cursor: pointer;
      border-radius: 2px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.2s;
      text-shadow: 0 0 5px #00ff00;
      white-space: nowrap;
    }

    .edit-toggle-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
    }

    .edit-toggle-btn.active {
      background: rgba(255, 0, 0, 0.2);
      border-color: #ff0000;
      color: #ff0000;
      text-shadow: 0 0 5px #ff0000;
    }

    .edit-toggle-btn.active:hover {
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
    }

    .categories { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem; 
    }

    .category {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #00ff00;
      border-radius: 2px;
      padding: 1.2rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.2), inset 0 0 15px rgba(0, 255, 0, 0.05);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .category-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 1rem;
      position: relative;
      z-index: 2;
      min-height: 60px;
    }

    .category-title {
      font-size: 1.08rem;
      font-weight: 700;
      color: #00ff00;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-shadow: 0 0 10px #00ff00;
      letter-spacing: 1px;
      width: 100%;
      margin-bottom: 0.8rem;
    }

    .category-icon {
      width: 29px;
      height: 29px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #00ff00;
      border-radius: 2px;

    .category-controls {

    .edit-mode .link-delete-btn {

    }

    .link-delete-btn:hover {

    .modal {

      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);

      align-items: center;
      justify-content: center;

    .modal-title {

      margin-bottom: 1.5rem;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    .form-group {

    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #00ff00;
      font-size: 0.9rem;
      text-shadow: 0 0 5px #00ff00;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.8rem;
      background: rgba(0, 255, 0, 0.05);
      border: 1px solid #00ff00;
      color: #00ff00;
      font-family: 'Orbitron', monospace;
      border-radius: 2px;
      font-size: 0.9rem;

    .form-group input:focus,

      box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
    }

    .modal-buttons {

      gap: 1rem;
      margin-top: 1.5rem;

    .modal-btn {

      border: 1px solid #00ff00;
      background: rgba(0, 255, 0, 0.1);

      padding: 2rem;

  <script>
    // Matrix digital rain animation
    const canvas = document.getElementById('matrixBackground');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const matrixChars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
    const charSize = 20;
    const columns = Math.ceil(canvas.width / charSize);
    
    // Initialize drops with random starting positions
    const drops = Array(columns).fill(0).map(() => ({
      y: Math.random() * canvas.height,
      speed: Math.random() * 2 + 1,
      opacity: Math.random() * 0.5 + 0.5
    }));

    function drawMatrix() {
      // Semi-transparent black background to create trail effect
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Set text properties
      ctx.fillStyle = '#00ff00';
      ctx.font = `bold ${charSize}px 'Courier New', monospace`;
      ctx.shadowColor = '#00ff00';
      ctx.shadowBlur = 10;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      for (let i = 0; i < drops.length; i++) {
        const drop = drops[i];
        
        // Draw multiple characters in a trail
        for (let j = 0; j < 5; j++) {
          const trailY = drop.y - (j * charSize);
          const trailOpacity = Math.max(0, 1 - (j * 0.2));
          
          ctx.globalAlpha = trailOpacity;
          const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
          ctx.fillText(char, i * charSize, trailY);
        }

        // Move the drop down
        drop.y += drop.speed;

        // Reset if character goes off screen
        if (drop.y > canvas.height) {
          drop.y = -charSize;
          drop.speed = Math.random() * 2 + 1;
        }
      }
      
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;

      requestAnimationFrame(drawMatrix);
    }

    drawMatrix();

      canvas.width = window.innerWidth;

    let data = JSON.parse(localStorage.getItem('matrixLinks')) || JSON.parse(JSON.stringify(defaultLinks));
    
    // Ensure all default categories exist in data
    defaultCategories.forEach(category => {
      if (!data[category]) {
        data[category] = defaultLinks[category] || [];
      }
    });
    
    // Migrate old string format to new object format
    Object.keys(data).forEach(category => {
      data[category] = data[category].map(item => {
        if (typeof item === 'string') {
          // Find matching link in defaultLinks
          const defaultLink = defaultLinks[category] && defaultLinks[category].find(l => l.name === item);
          return defaultLink || {name: item, url: '#'};
        }
        return item;
      });
    });
    
    let draggedElement = null;
    let currentEditLink = null;
    let currentEditCategory = null;

    function saveData() {
      localStorage.setItem('matrixLinks', JSON.stringify(data));
    }

    function renderCategories() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = '';
      
      Object.keys(data).forEach(category => {
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'category-header';
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'category-title';
        titleDiv.innerHTML = `

        `;
        
        const controlsDiv = document.createElement('div');
        controlsDiv.className = 'category-controls';
        
        if (editMode) {
          const editCatBtn = document.createElement('button');
          editCatBtn.className = 'icon-btn';
          editCatBtn.textContent = '✏️';
          editCatBtn.onclick = () => showEditCategoryModal(category);
          controlsDiv.appendChild(editCatBtn);
          
          const addBtn = document.createElement('button');
          addBtn.className = 'icon-btn';
          addBtn.textContent = '➕';
          addBtn.onclick = () => showAddLinkModal(category);
          controlsDiv.appendChild(addBtn);
        }
        
        headerDiv.appendChild(titleDiv);
        headerDiv.appendChild(controlsDiv);
        categoryDiv.appendChild(headerDiv);
        
        const linksGrid = document.createElement('div');
        linksGrid.className = 'links-grid';
        
        if (data[category].length === 0) {
          const emptyState = document.createElement('div');
          emptyState.className = 'empty-state';
          emptyState.textContent = 'No links yet...';
          linksGrid.appendChild(emptyState);
        } else {
          data[category].forEach((link, index) => {
            const linkBtn = document.createElement('a');
            linkBtn.className = 'link-btn';
            if (editMode) linkBtn.classList.add('edit-mode');
            linkBtn.href = link.url || '#';
            linkBtn.textContent = link.name || link;
            linkBtn.draggable = editMode;
            linkBtn.target = '_blank';
            
            if (editMode) {
              const deleteBtn = document.createElement('div');
              deleteBtn.className = 'link-delete-btn';
              deleteBtn.textContent = '✕';
              deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deleteLink(category, index);
              };
              linkBtn.appendChild(deleteBtn);
              
              linkBtn.ondragstart = (e) => {
                draggedElement = { link, category, index };
                linkBtn.classList.add('dragging');
              };
              linkBtn.ondragend = () => {
                linkBtn.classList.remove('dragging');
              };
              
              linkBtn.ondblclick = () => {
                showEditLinkModal(category, index, link);
              };
            }
            
            linkBtn.onclick = (e) => {
              if (editMode) {
                e.preventDefault();
              }
              // Allow normal link navigation when not in edit mode
            };
            
            linksGrid.appendChild(linkBtn);
          });
        }
        
        linksGrid.ondrop = (e) => {
          e.preventDefault();
          if (draggedElement && editMode) {
            moveLink(draggedElement.category, draggedElement.index, category);
          }
        };
        linksGrid.ondragover = (e) => e.preventDefault();
        
        categoryDiv.appendChild(linksGrid);
        container.appendChild(categoryDiv);
      });
    }

    function toggleEditMode() {
      editMode = !editMode;
      const btn = document.getElementById('editToggle');
      btn.textContent = editMode ? 'EXIT EDIT' : 'EDIT MODE';
      btn.classList.toggle('active');
      renderCategories();
    }

    function showAddLinkModal(category) {
      const modal = document.getElementById('addLinkModal');
      const select = document.getElementById('linkCategory');
      select.innerHTML = Object.keys(data).map(cat => `<option value="${cat}">${cat}</option>`).join('');
      select.value = category;
      modal.classList.add('active');
    }

    function showEditLinkModal(category, index, link) {
      currentEditLink = link;
      currentEditCategory = { category, index };
      const linkName = typeof link === 'string' ? link : link.name;
      const linkUrl = typeof link === 'string' ? '#' : link.url;
      document.getElementById('editLinkName').value = linkName;
      document.getElementById('editLinkUrl').value = linkUrl;
      const select = document.getElementById('editLinkCategory');
      select.innerHTML = Object.keys(data).map(cat => `<option value="${cat}">${cat}</option>`).join('');
      select.value = category;
      document.getElementById('editLinkModal').classList.add('active');
    }

    function showEditCategoryModal(oldCategory) {
      currentEditCategory = { oldCategory };
      document.getElementById('editCategoryName').value = oldCategory;
      document.getElementById('editCategoryModal').classList.add('active');
    }

    function addLink() {
      const name = document.getElementById('linkName').value.trim();
      const category = document.getElementById('linkCategory').value;
      
      if (!name) {
        alert('> ERROR: LINK NAME REQUIRED');
        return;
      }
      
      if (!data[category]) data[category] = [];
      data[category].push({name: name, url: '#'});
      saveData();
      renderCategories();
      
      document.getElementById('linkName').value = '';
      document.getElementById('addLinkModal').classList.remove('active');
    }

    function deleteLink(category, index) {
      const linkName = typeof data[category][index] === 'string' ? data[category][index] : data[category][index].name;
      if (confirm('> DELETE LINK: ' + linkName + '?')) {
        data[category].splice(index, 1);
        saveData();
        renderCategories();
      }
    }

    function moveLink(fromCategory, fromIndex, toCategory) {
      const link = data[fromCategory][fromIndex];
      data[fromCategory].splice(fromIndex, 1);
      if (!data[toCategory]) data[toCategory] = [];
      data[toCategory].push(link);
      saveData();
      renderCategories();
    }

    function saveEditLink() {
      const newName = document.getElementById('editLinkName').value.trim();
      const newUrl = document.getElementById('editLinkUrl').value.trim();
      const newCategory = document.getElementById('editLinkCategory').value;
      
      if (!newName) {
        alert('> ERROR: LINK NAME REQUIRED');
        return;
      }
      
      const { category, index } = currentEditCategory;
      const newLinkObject = {name: newName, url: newUrl || '#'};
      
      if (newCategory !== category) {
        // Moving to a different category
        data[category].splice(index, 1);
        if (!data[newCategory]) data[newCategory] = [];
        data[newCategory].push(newLinkObject);
      } else {
        // Updating in same category
        data[category][index] = newLinkObject;
      }
      
      saveData();
      renderCategories();
      document.getElementById('editLinkModal').classList.remove('active');
      currentEditLink = null;
      currentEditCategory = null;
    }

    function saveEditCategory() {
      const newCategoryName = document.getElementById('editCategoryName').value.trim();
      
      if (!newCategoryName) {
        alert('> ERROR: CATEGORY NAME REQUIRED');
        return;
      }
      
      const { oldCategory } = currentEditCategory;
      
      if (newCategoryName !== oldCategory) {
        // Rename the category
        data[newCategoryName] = data[oldCategory];
        delete data[oldCategory];
        
        // Update categoryIcons if it exists
        if (categoryIcons[oldCategory]) {
          categoryIcons[newCategoryName] = categoryIcons[oldCategory];
          delete categoryIcons[oldCategory];
        }
      }
      
      saveData();
      renderCategories();
      document.getElementById('editCategoryModal').classList.remove('active');
      currentEditCategory = null;
    }

    // Event listeners
    document.getElementById('editToggle').addEventListener('click', toggleEditMode);
    document.getElementById('addLinkBtn').addEventListener('click', addLink);
    document.getElementById('cancelAddBtn').addEventListener('click', () => {
      document.getElementById('addLinkModal').classList.remove('active');
      document.getElementById('linkName').value = '';
    });
    document.getElementById('saveLinkBtn').addEventListener('click', saveEditLink);
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      document.getElementById('editLinkModal').classList.remove('active');
      currentEditLink = null;
      currentEditCategory = null;
    });

    document.getElementById('linkName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addLink();
    });

    document.getElementById('editLinkName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEditLink();
    });

    document.getElementById('editLinkUrl').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEditLink();
    });

    document.getElementById('saveCategoryBtn').addEventListener('click', saveEditCategory);
    document.getElementById('cancelCategoryBtn').addEventListener('click', () => {
      document.getElementById('editCategoryModal').classList.remove('active');
      currentEditCategory = null;
    });

    document.getElementById('editCategoryName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEditCategory();
    });

    // Initial render
    renderCategories();
  </script>
</body>
</html>
