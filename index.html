<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tristan's Matrix Links</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Orbitron', monospace;
      background: #000000;
      min-height: 100vh;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff0099;
      position: relative;
      overflow-x: hidden;
    }

    #matrixBackground {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.15;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          rgba(0, 255, 0, 0.03) 0px,
          rgba(0, 255, 0, 0.03) 1px,
          transparent 1px,
          transparent 2px
        );
      pointer-events: none;
      z-index: 1;
      animation: scanlines 8s linear infinite;
    }

    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 1rem 0.5rem;
      position: relative;
      z-index: 2;
    }

    .header {
      text-align: left;
      margin-bottom: 1.8rem;
      border: 2px solid #00ff00;
      border-radius: 4px;
      padding: 1.2rem;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 255, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      backdrop-filter: blur(10px);
      flex-wrap: wrap;
      gap: 1rem;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
      }
    }

    .header-content {
      flex: 1;
    }

    .header h1 {
      font-size: 1.6rem;
      margin-bottom: 0.6rem;
      font-weight: 900;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff0099, 0 0 30px #00ff0066;
      letter-spacing: 2px;
      line-height: 1.2;
    }

    .header p {
      font-size: 0.78rem;
      color: #00cc00;
      letter-spacing: 1px;
      margin-top: 0.6rem;
      line-height: 1.2;
    }

    .edit-toggle-btn {
      background: rgba(0, 255, 0, 0.1);
      border: 2px solid #00ff00;
      color: #00ff00;
      padding: 0.6rem 1.2rem;
      font-size: 0.84rem;
      cursor: pointer;
      border-radius: 2px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      letter-spacing: 1px;
      transition: all 0.2s;
      text-shadow: 0 0 5px #00ff00;
      white-space: nowrap;
    }

    .edit-toggle-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
    }

    .edit-toggle-btn.active {
      background: rgba(255, 0, 0, 0.2);
      border-color: #ff0000;
      color: #ff0000;
      text-shadow: 0 0 5px #ff0000;
    }

    .edit-toggle-btn.active:hover {
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
    }

    .categories { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1rem; 
    }

    .category {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #00ff00;
      border-radius: 2px;
      padding: 1.2rem;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.2), inset 0 0 15px rgba(0, 255, 0, 0.05);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .category-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 1rem;
      position: relative;
      z-index: 2;
      min-height: 45px;
      justify-content: flex-start;
    }

    .category-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #00ff00;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-shadow: 0 0 10px #00ff00;
      letter-spacing: 1px;
      width: 100%;
      margin-bottom: 0.4rem;
      order: 1;
    }

    .category-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #00ff00;
      font-size: 28px;
    }

    .category-icon.material-symbols-outlined {
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
    }

    .category-controls {
      display: flex;
      gap: 0.5rem;
      position: relative;
      z-index: 3;
      align-self: flex-start;
      order: 2;
    }

    .icon-btn {
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      color: #00ff00;
      width: 26px;
      height: 26px;
      cursor: pointer;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.6rem;
      position: relative;
      z-index: 2;
    }

    @media (max-width: 768px) {
      .links-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 480px) {
      .links-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .link-btn {
      padding: 0.6rem 0.5rem;
      border: 1px solid #00ff00;
      border-radius: 2px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: all 0.2s;
      color: #00ff00;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(0, 0, 0, 0.5);
      text-shadow: 0 0 5px #00ff00;
      font-family: 'Orbitron', monospace;
      letter-spacing: 0.5px;
      position: relative;
    }

    @media (max-width: 768px) {
      .link-btn {
        font-size: 0.7rem;
        padding: 0.5rem 0.4rem;
      }
    }

    .link-btn:hover {
      background: rgba(0, 255, 0, 0.15);
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.6), inset 0 0 15px rgba(0, 255, 0, 0.2);
      transform: scale(1.05);
      color: #00ffaa;
    }

    .link-btn.edit-mode {
      cursor: grab;
    }

    .link-btn.edit-mode:active {
      cursor: grabbing;
    }

    .link-delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(255, 0, 0, 0.3);
      border: 1px solid #ff0000;
      color: #ff0000;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
      z-index: 10;
    }

    .link-delete-btn:hover {
      background: rgba(255, 0, 0, 0.6);
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      color: #00cc00;
      padding: 1rem;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      border: 2px solid #00ff00;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background-color: #000000;
      padding: 2rem;
      border: 2px solid #00ff00;
      border-radius: 4px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
    }

    .modal-title {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #00ff00;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.7rem;
      background: rgba(0, 255, 0, 0.05);
      border: 1px solid #00ff00;
      color: #00ff00;
      font-family: 'Orbitron', monospace;
      border-radius: 2px;
      font-size: 0.85rem;
    }

    .form-group input::placeholder {
      color: #006600;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
      background: rgba(0, 255, 0, 0.1);
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 0.7rem 1.5rem;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      color: #00ff00;
      cursor: pointer;
      border-radius: 2px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      transition: all 0.2s;
    }

    .modal-btn:hover {
      background: rgba(0, 255, 0, 0.2);
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }

    .modal-btn.cancel {
      background: rgba(255, 0, 0, 0.1);
      border-color: #ff0000;
      color: #ff0000;
    }

    .modal-btn.cancel:hover {
      background: rgba(255, 0, 0, 0.2);
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    .dragging {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <canvas id="matrixBackground"></canvas>

  <div class="container">
    <div class="header">
      <div class="header-content">
        <h1>// TG MATRIX ACCESS</h1>
        <p>PERSONAL LINK TERMINAL</p>
      </div>
      <button class="edit-toggle-btn" id="editToggle">EDIT MODE</button>
    </div>

    <div id="categoriesContainer" class="categories"></div>
  </div>

  <div class="modal" id="addLinkModal">
    <div class="modal-content">
      <div class="modal-title">ADD LINK</div>
      <div class="form-group">
        <label>Link Name</label>
        <input type="text" id="linkName" placeholder="Enter link name">
      </div>
      <div class="form-group">
        <label>Link URL</label>
        <input type="text" id="linkUrl" placeholder="Enter URL">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="linkCategory"></select>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn" id="addLinkBtn">ADD</button>
        <button class="modal-btn cancel" id="cancelAddBtn">CANCEL</button>
      </div>
    </div>
  </div>

  <div class="modal" id="editLinkModal">
    <div class="modal-content">
      <div class="modal-title">EDIT LINK</div>
      <div class="form-group">
        <label>Link Name</label>
        <input type="text" id="editLinkName" placeholder="Enter link name">
      </div>
      <div class="form-group">
        <label>Link URL</label>
        <input type="text" id="editLinkUrl" placeholder="Enter URL">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="editLinkCategory"></select>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn" id="saveLinkBtn">SAVE</button>
        <button class="modal-btn cancel" id="cancelEditBtn">CANCEL</button>
      </div>
    </div>
  </div>

  <div class="modal" id="editCategoryModal">
    <div class="modal-content">
      <div class="modal-title">EDIT CATEGORY</div>
      <div class="form-group">
        <label>Category Name</label>
        <input type="text" id="editCategoryName" placeholder="Enter category name">
      </div>
      <div class="modal-buttons">
        <button class="modal-btn" id="saveCategoryBtn">SAVE</button>
        <button class="modal-btn cancel" id="cancelCategoryBtn">CANCEL</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('matrixBackground');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
    const cols = Math.floor(canvas.width / 20);
    const drops = Array(cols).fill(0);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff00';
      ctx.font = '16px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * 20, drops[i] * 20);
        if (drops[i] * 20 > canvas.height && Math.random() > 0.9) drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 60);
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const iconMap = {
      'Main': 'link',
      'Entertainment': 'tv',
      'Commerce': 'shopping_cart',
      'Gaming': 'gamepad',
      'Documents': 'description',
      'Development': 'code',
      'Utility': 'settings',
      'Finance & Home': 'account_balance'
    };

    const defaultLinks = {
      'Main': [
        {name: 'Gmail', url: 'https://mail.google.com/mail/u/0/?tab=wm&ogbl#inbox'},
        {name: 'Google Drive', url: 'https://drive.google.com/drive/u/0/my-drive'},
        {name: 'Google Sheets', url: 'https://docs.google.com/spreadsheets/u/0/'},
        {name: 'NRL', url: 'https://www.nrl.com.au/'},
        {name: 'Ozbargain', url: 'https://www.ozbargain.com.au/deals/dominos.com.au'},
        {name: 'FootyTips', url: 'https://www.footytips.com.au/competitions/?competitionId=515397'}
      ],
      'Entertainment': [
        {name: 'Netflix', url: 'https://www.netflix.com.au/'},
        {name: 'Plex Media', url: 'https://app.plex.tv/desktop/'},
        {name: 'FlixHDcc', url: 'https://flixhd.cc/'},
        {name: 'Binge', url: 'https://binge.com.au/profile'},
        {name: 'YouTube', url: 'https://www.youtube.com/'},
        {name: 'Amazon Video', url: 'https://www.amazon.com/Amazon-Video/b/?node=2858778011'},
        {name: 'Y Flix Online', url: 'https://yflix.online/'},
        {name: 'Y Flix to', url: 'https://yflix.to/'},
        {name: 'Spotify', url: 'https://www.spotify.com/au/'}
      ],
      'Commerce': [
        {name: 'Amazon', url: 'https://www.amazon.com.au/'},
        {name: 'Google', url: 'https://www.google.com.au/'},
        {name: 'eBay', url: 'https://www.ebay.com.au/'},
        {name: 'GumTree', url: 'https://www.gumtree.com.au/'},
        {name: 'Dominos', url: 'https://order.dominos.com.au/'}
      ],
      'Gaming': [
        {name: 'Discord', url: 'https://discord.com/channels/@me'},
        {name: 'Minecraft Tools', url: 'https://mc-map.djfun.de/'},
        {name: 'Poki Games', url: 'https://poki.com/'},
        {name: 'Console: SNES', url: 'https://supernintendoemulator.com/'},
        {name: 'Console: Megadrive', url: 'https://megadrive-emulator.com/'},
        {name: 'Emulator Games', url: 'https://www.emugames.net/'}
      ],
      'Documents': [
        {name: 'Cebuano Vocab', url: 'https://docs.google.com/spreadsheets/d/1Fg9IhYOLkG43VXM3caVU_CGfn2X7a7xrjy4E17INwiQ/edit'},
        {name: 'Budget', url: 'https://docs.google.com/spreadsheets/d/1E0wQIovpQ-ryQK2QKMmP_ccUBUx-3S2zeQxgEvqB2xY/'}
      ],
      'Development': [
        {name: 'Image Hosting', url: 'https://imgbb.com/'},
        {name: 'PNG to Icon', url: 'https://iconconvert.com/'},
        {name: 'Tinkercad', url: 'https://www.tinkercad.com/dashboard/designs/3d'},
        {name: '3D Models', url: 'https://3d-gallery.xyzprinting.com/'},
        {name: 'Pixabay', url: 'https://pixabay.com/'},
        {name: 'Photo Editing', url: 'https://pixlr.com/x/'}
      ],
      'Utility': [
        {name: 'Alexa Config', url: 'https://alexa.amazon.com/spa/index.html#cards'},
        {name: 'If This Then That', url: 'https://ifttt.com/'},
        {name: 'FlashCloud', url: 'https://cloud.sz3dp.com/main.html'},
        {name: 'Terra Master NAS', url: 'http://192.168.0.171:8181/tos/#/desktop'},
        {name: 'Unify Machine', url: 'https://unifi.ui.com/'}
      ],
      'Finance & Home': [
        {name: 'CommBank', url: 'https://www.commbank.com.au/'},
        {name: 'DoDo Gas', url: 'https://my.dodo.com/dashboard'},
        {name: 'LINK Tolls', url: 'https://www.linkt.com.au/campaigns/eway-redirect/sydney'},
        {name: 'My Gov', url: 'https://login.my.gov.au/'}
      ]
    };

    let editMode = false;
    
    const storedData = localStorage.getItem('matrixLinks');
    let data;
    
    if (storedData) {
      try {
        const parsed = JSON.parse(storedData);
        const hasCorrectCategories = Object.keys(defaultLinks).every(cat => cat in parsed);
        const hasOldCategories = Object.keys(parsed).some(cat => 
          cat.includes('STREAM') || cat.includes('NETWORK') || cat.includes('VAULT') || cat.includes('PROTOCOL') || cat.includes('DATABASE') || cat.includes('REPOSITORY') || cat.includes('[')
        );
        
        if (hasOldCategories || !hasCorrectCategories) {
          localStorage.removeItem('matrixLinks');
          data = JSON.parse(JSON.stringify(defaultLinks));
        } else {
          data = parsed;
        }
      } catch (e) {
        localStorage.removeItem('matrixLinks');
        data = JSON.parse(JSON.stringify(defaultLinks));
      }
    } else {
      data = JSON.parse(JSON.stringify(defaultLinks));
    }
    
    Object.keys(defaultLinks).forEach(category => {
      if (!data[category]) {
        data[category] = defaultLinks[category] || [];
      }
    });
    
    Object.keys(data).forEach(category => {
      data[category] = data[category].map(item => {
        if (typeof item === 'string') {
          const defaultLink = defaultLinks[category] && defaultLinks[category].find(l => l.name === item);
          return defaultLink || {name: item, url: '#'};
        }
        return item;
      });
    });
    
    let draggedElement = null;
    let currentEditLink = null;
    let currentEditCategory = null;

    function saveData() {
      localStorage.setItem('matrixLinks', JSON.stringify(data));
    }

    function renderCategories() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = '';
      
      Object.keys(data).forEach(category => {
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'category-header';
        
        const titleDiv = document.createElement('div');
        titleDiv.className = 'category-title';
        const iconName = iconMap[category] || 'link';
        titleDiv.innerHTML = `
          <span class="category-icon material-symbols-outlined">${iconName}</span>
          ${category}
        `;
        
        const controlsDiv = document.createElement('div');
        controlsDiv.className = 'category-controls';
        
        if (editMode) {
          const editCatBtn = document.createElement('button');
          editCatBtn.className = 'icon-btn';
          editCatBtn.textContent = '✏️';
          editCatBtn.onclick = () => showEditCategoryModal(category);
          controlsDiv.appendChild(editCatBtn);
          
          const addBtn = document.createElement('button');
          addBtn.className = 'icon-btn';
          addBtn.textContent = '➕';
          addBtn.onclick = () => showAddLinkModal(category);
          controlsDiv.appendChild(addBtn);
        }
        
        headerDiv.appendChild(titleDiv);
        headerDiv.appendChild(controlsDiv);
        categoryDiv.appendChild(headerDiv);
        
        const linksGrid = document.createElement('div');
        linksGrid.className = 'links-grid';
        
        if (data[category].length === 0) {
          const emptyState = document.createElement('div');
          emptyState.className = 'empty-state';
          emptyState.textContent = 'No links yet...';
          linksGrid.appendChild(emptyState);
        } else {
          data[category].forEach((link, index) => {
            const linkBtn = document.createElement('a');
            linkBtn.className = 'link-btn';
            if (editMode) linkBtn.classList.add('edit-mode');
            linkBtn.href = link.url || '#';
            linkBtn.textContent = link.name || link;
            linkBtn.draggable = editMode;
            linkBtn.target = '_blank';
            
            if (editMode) {
              const deleteBtn = document.createElement('div');
              deleteBtn.className = 'link-delete-btn';
              deleteBtn.textContent = '✕';
              deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deleteLink(category, index);
              };
              linkBtn.appendChild(deleteBtn);
              
              linkBtn.ondragstart = (e) => {
                draggedElement = { link, category, index };
                linkBtn.classList.add('dragging');
              };
              linkBtn.ondragend = () => {
                linkBtn.classList.remove('dragging');
              };
              
              linkBtn.ondblclick = () => {
                showEditLinkModal(category, index, link);
              };
            }
            
            linkBtn.onclick = (e) => {
              if (editMode) {
                e.preventDefault();
              }
            };
            
            linksGrid.appendChild(linkBtn);
          });
        }
        
        linksGrid.ondrop = (e) => {
          e.preventDefault();
          if (draggedElement && editMode) {
            moveLink(draggedElement.category, draggedElement.index, category);
          }
        };
        linksGrid.ondragover = (e) => e.preventDefault();
        
        categoryDiv.appendChild(linksGrid);
        container.appendChild(categoryDiv);
      });
    }

    function toggleEditMode() {
      editMode = !editMode;
      const btn = document.getElementById('editToggle');
      btn.textContent = editMode ? 'EXIT EDIT' : 'EDIT MODE';
      btn.classList.toggle('active');
      renderCategories();
    }

    function showAddLinkModal(category) {
      const modal = document.getElementById('addLinkModal');
      const select = document.getElementById('linkCategory');
      select.innerHTML = Object.keys(data).map(cat => `<option value="${cat}">${cat}</option>`).join('');
      select.value = category;
      modal.classList.add('active');
    }

    function showEditLinkModal(category, index, link) {
      currentEditLink = link;
      currentEditCategory = { category, index };
      const linkName = typeof link === 'string' ? link : link.name;
      const linkUrl = typeof link === 'string' ? '#' : link.url;
      document.getElementById('editLinkName').value = linkName;
      document.getElementById('editLinkUrl').value = linkUrl;
      const select = document.getElementById('editLinkCategory');
      select.innerHTML = Object.keys(data).map(cat => `<option value="${cat}">${cat}</option>`).join('');
      select.value = category;
      document.getElementById('editLinkModal').classList.add('active');
    }

    function showEditCategoryModal(oldCategory) {
      currentEditCategory = { oldCategory };
      document.getElementById('editCategoryName').value = oldCategory;
      document.getElementById('editCategoryModal').classList.add('active');
    }

    function addLink() {
      const name = document.getElementById('linkName').value.trim();
      const url = document.getElementById('linkUrl').value.trim();
      const category = document.getElementById('linkCategory').value;
      
      if (!name) {
        alert('> ERROR: LINK NAME REQUIRED');
        return;
      }
      
      if (!data[category]) data[category] = [];
      data[category].push({name: name, url: url || '#'});
      saveData();
      renderCategories();
      
      document.getElementById('linkName').value = '';
      document.getElementById('linkUrl').value = '';
      document.getElementById('addLinkModal').classList.remove('active');
    }

    function deleteLink(category, index) {
      const linkName = typeof data[category][index] === 'string' ? data[category][index] : data[category][index].name;
      if (confirm('> DELETE LINK: ' + linkName + '?')) {
        data[category].splice(index, 1);
        saveData();
        renderCategories();
      }
    }

    function moveLink(fromCategory, fromIndex, toCategory) {
      const link = data[fromCategory][fromIndex];
      data[fromCategory].splice(fromIndex, 1);
      if (!data[toCategory]) data[toCategory] = [];
      data[toCategory].push(link);
      saveData();
      renderCategories();
    }

    function saveEditLink() {
      const newName = document.getElementById('editLinkName').value.trim();
      const newUrl = document.getElementById('editLinkUrl').value.trim();
      const newCategory = document.getElementById('editLinkCategory').value;
      
      if (!newName) {
        alert('> ERROR: LINK NAME REQUIRED');
        return;
      }
      
      const { category, index } = currentEditCategory;
      const newLinkObject = {name: newName, url: newUrl || '#'};
      
      if (newCategory !== category) {
        data[category].splice(index, 1);
        if (!data[newCategory]) data[newCategory] = [];
        data[newCategory].push(newLinkObject);
      } else {
        data[category][index] = newLinkObject;
      }
      
      saveData();
      renderCategories();
      document.getElementById('editLinkModal').classList.remove('active');
      currentEditLink = null;
      currentEditCategory = null;
    }

    function saveEditCategory() {
      const newCategoryName = document.getElementById('editCategoryName').value.trim();
      
      if (!newCategoryName) {
        alert('> ERROR: CATEGORY NAME REQUIRED');
        return;
      }
      
      const { oldCategory } = currentEditCategory;
      
      if (newCategoryName !== oldCategory) {
        data[newCategoryName] = data[oldCategory];
        delete data[oldCategory];
      }
      
      saveData();
      renderCategories();
      document.getElementById('editCategoryModal').classList.remove('active');
      currentEditCategory = null;
    }

    document.getElementById('editToggle').addEventListener('click', toggleEditMode);
    document.getElementById('addLinkBtn').addEventListener('click', addLink);
    document.getElementById('cancelAddBtn').addEventListener('click', () => {
      document.getElementById('addLinkModal').classList.remove('active');
      document.getElementById('linkName').value = '';
      document.getElementById('linkUrl').value = '';
    });
    document.getElementById('saveLinkBtn').addEventListener('click', saveEditLink);
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      document.getElementById('editLinkModal').classList.remove('active');
      currentEditLink = null;
      currentEditCategory = null;
    });
    document.getElementById('saveCategoryBtn').addEventListener('click', saveEditCategory);
    document.getElementById('cancelCategoryBtn').addEventListener('click', () => {
      document.getElementById('editCategoryModal').classList.remove('active');
      currentEditCategory = null;
    });

    document.getElementById('linkName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addLink();
    });
    document.getElementById('editLinkName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEditLink();
    });
    document.getElementById('editLinkUrl').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEditLink();
    });
    document.getElementById('editCategoryName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') saveEditCategory();
    });

    renderCategories();
  </script>
</body>
</html>
